# NetAIOps Webhook 示例配置
# 使用时复制为 config.yaml，并按实际环境修改。
# 真实 config.yaml、env、token、secret 不得提交 Git。

app_name: "netaiops-webhook"
listen_host: "0.0.0.0"
listen_port: 18080
external_base_url: "http://127.0.0.1:18080"

defaults:
  vendor: "unknown"
  severity: "warning"

pipeline:
  enabled: true
  auto_confirm: true
  auto_dispatch: true
  auto_review: true
  auto_notify: true

llm:
  enabled: false
  provider: "openai_compatible"
  base_url: "http://127.0.0.1:8000/v1"
  api_key_env: "NETAIOPS_LLM_API_KEY"
  model: "glm-5.2"
  timeout: 60
  verify_ssl: true
  temperature: 0.2
  max_tokens: 1200
  endpoints: []
  retry: 1
  connect_timeout: 10
  read_timeout: 60
  write_timeout: 60
  pool_timeout: 10
  channel_names: []
  extra_body: {}

analysis:
  save_prompt: true
  save_result: true

runner:
  backend: "mcp"
  max_commands: 5
  command_timeout: 30
  readonly_only: true

mcp:
  mode: "sse"
  server_url: "http://127.0.0.1:10000/sse"
  timeout: 60
  wrapper_cmd: ""
  wrapper_cmd_env: "MCP_WRAPPER_CMD"
  timeout_env: "MCP_TIMEOUT"

notify:
  enabled: false
  provider: "dingtalk"
  notification_mode: "slim"
  ai_notification_mode: "card"
  ai_card_config_path: "/opt/netaiops-webhook/config/ai_analysis_dongdong.env"
  ai_card_fallback_to_text: true
  webhook_url_env: "NETAIOPS_DINGTALK_WEBHOOK"
  secret_env: "NETAIOPS_DINGTALK_SECRET"
  timeout: 10
  retry: 1
  send_on:
    - "firing"
    - "resolved"

data:
  base_dir: "/opt/netaiops-webhook/data"

catalogs:
  three_layer_dir: "/opt/netaiops-webhook/catalogs/three_layer"

capability_planner:
  enabled: false
  provider: "openai_compatible"
  base_url: ""
  api_key_env: "NETAIOPS_LLM_API_KEY"
  model: ""
  timeout: 45
  temperature: 0.1
  max_tokens: 800
  fallback_on_error: true
  families_enabled:
    - "interface_or_link_utilization_high"
    - "interface_packet_loss_or_discards_high"
    - "interface_or_link_traffic_drop"
    - "interface_status_or_flap"
    - "bgp_neighbor_down"
    - "ospf_neighbor_down"
    - "device_cpu_high"
    - "device_memory_high"
    - "f5_pool_member_down"

alert_throttle:
  enabled: true
  cooldown_minutes: 10
  active_window_minutes: 5
  resolved_disable_auto_execute: true
  same_device_concurrency_limit: 1

safety_policy:
  enabled: true
  readonly_only: true
  max_commands_per_request: 5
  command_timeout_sec: 30
  audit_enabled: true
  high_risk_devices: []
  allowed_capabilities:
    - "show_interface_detail"
    - "show_interface_error_counters"
    - "show_interface_brief"
    - "show_portchannel_summary"
    - "show_lacp_neighbor"
    - "show_recent_logs"
    - "show_bgp_peer_detail"
    - "show_route_to_peer"
    - "ping_peer"
    - "show_bgp_config_snippet"
    - "show_ospf_peer_detail"
    - "show_device_cpu"
    - "show_device_memory"
    - "show_f5_pool_list"
    - "show_f5_pool_members"
    - "show_f5_pool_config"
    - "show_f5_connections"
    - "show_f5_performance"
  allowed_command_prefixes:
    - "show "
    - "display "
    - "get "
    - "diagnose hardware deviceinfo "
    - "diagnose netlink "
    - "get router info "
    - "get system "
    - "get log "
    - "ping "
    - "traceroute "
    - "tmsh show "
    - "tmsh list "
  # 正则使用 YAML 单引号，避免反斜杠被当作双引号转义。
  deny_command_patterns:
    - '^\s*conf(?:ig(?:ure)?)?\b'
    - '^\s*configure\b'
    - '^\s*set\s+'
    - '^\s*delete\s+'
    - '^\s*clear\s+'
    - '^\s*reset\s+'
    - '^\s*reload\b'
    - '^\s*reboot\b'
    - '^\s*shutdown\b'
    - '^\s*no\s+shutdown\b'
    - '^\s*write\b'
    - '^\s*copy\s+'
    - '^\s*commit\b'
    - '^\s*save\b'
    - '^\s*erase\b'
    - '^\s*bash\b'
    - '^\s*python\b'
    - '^\s*sudo\b'
    - ';'
    - '&&'
    - '\|\|'

# Prometheus HTTP 窗口证据示例。
# PromQL 以现网 SNMP 1 分钟采集为基本精度。
prometheus:
  enabled: false
  base_url: "http://127.0.0.1:9090"
  timeout: 10
  lookback_minutes: 15
  lookahead_minutes: 5
  step: "60s"
  rate_window: "1m"
  high_threshold_percent: 80
  recovered_threshold_percent: 20
  metric_names:
    if_in_octets: "ifHCInOctets"
    if_out_octets: "ifHCOutOctets"
    if_speed_mbps: "ifHighSpeed"
  label_names:
    instance: "instance"
    if_name: "ifName"
  queries:
    interface_input_utilization_percent: ""
    interface_output_utilization_percent: ""
    interface_input_bps: ""
    interface_output_bps: ""

prometheus_mcp:
  enabled: false
  transport: "sse"
  sse_url: "http://127.0.0.1:10001/sse"
  backend_url: "http://127.0.0.1:8428/select/0/prometheus"
  timeout_seconds: 60
  default_lookback_minutes: 15
  default_step_seconds: 60
  max_series_limit: 200
  fallback_http_api:
    enabled: false
    url: "http://127.0.0.1:8428/select/0/prometheus"
  runtime_sidecar:
    enabled: false
    mode: "deterministic"
    max_queries_per_alert: 4
    overall_timeout_seconds: 60
    max_candidates_per_query: 3
    parallel_workers: 2
    failure_policy: "continue"
    write_record: true
    update_plan: true
    note: ""

prometheus_direct:
  enabled_for_targets: false
  url: "http://127.0.0.1:8428/select/0/prometheus"

safety:
  max_commands_per_request: 5
  readonly_auto_execute_max_commands: 5
  note: "Only read-only commands are allowed."

evidence_hub:
  enabled: true
  base_url: "http://127.0.0.1:18080"
  default_to_local: true

v12_multi_agent:
  enabled: false
  mode: "shadow"
  fail_open_to_legacy: true
  reuse_existing_evidence: true
  notifications_use_v12: false

  budgets:
    total_timeout_seconds: 90
    triage_timeout_seconds: 5
    planner_timeout_seconds: 5
    metrics_timeout_seconds: 30
    device_timeout_seconds: 45
    logs_timeout_seconds: 5
    knowledge_timeout_seconds: 5
    judge_timeout_seconds: 5
    rca_timeout_seconds: 30
    report_timeout_seconds: 5

  rca:
    enabled: false
    provider: "glm-5.2"
    max_candidates: 3
    require_evidence_refs: true

  traces:
    enabled: true
    redact_sensitive_fields: true

logs_evidence:
  enabled: false
  reason: "logs_evidence_not_approved"

knowledge_context:
  enabled: false
  reason: "local_knowledge_base_not_built"
