# NetAIOps Webhook 示例配置
# 使用时复制为 config.yaml，并按实际环境修改。
# 不要把真实 config.yaml 提交到 Git。

listen_host: "0.0.0.0"
listen_port: 18080

external_base_url: "http://127.0.0.1:18080"

pipeline:
  enabled: true
  auto_confirm: true
  auto_dispatch: true
  auto_review: true
  auto_notify: true

llm:
  provider: "openai_compatible"
  base_url: "http://127.0.0.1:8000/v1"
  api_key_env: "NETAIOPS_LLM_API_KEY"
  model: "replace-with-your-model"
  timeout: 60

runner:
  backend: "mcp"
  max_commands: 5
  command_timeout: 30
  readonly_only: true

mcp:
  wrapper_cmd_env: "MCP_WRAPPER_CMD"
  timeout_env: "MCP_TIMEOUT"

notify:
  enabled: false
  provider: "dingtalk"
  webhook_url_env: "NETAIOPS_DINGTALK_WEBHOOK"
  secret_env: "NETAIOPS_DINGTALK_SECRET"

data:
  base_dir: "/opt/netaiops-webhook/data"

catalogs:
  three_layer_dir: "/opt/netaiops-webhook/catalogs/three_layer"


prometheus:
  enabled: false
  base_url: "http://127.0.0.1:9090"
  timeout: 10
  lookback_minutes: 15
  lookahead_minutes: 5
  step: "60s"
  high_threshold_percent: 80
  recovered_threshold_percent: 20
  queries:
    # 按你的 Prometheus 实际指标名调整。
    # 可用变量：
    # {device_ip} {hostname} {interface} {if_alias} {job} {instance} {alarm_type}
    interface_output_utilization_percent: ""
    interface_output_bps: ""


capability_planner:
  enabled: false
  provider: "openai_compatible"
  base_url: ""
  api_key_env: "NETAIOPS_LLM_API_KEY"
  model: ""
  timeout: 45
  temperature: 0.1
  max_tokens: 800
  fallback_on_error: true
  families_enabled:
    - interface_or_link_utilization_high
    - interface_packet_loss_or_discards_high
    - interface_or_link_traffic_drop
    - interface_status_or_flap
    - bgp_neighbor_down
    - ospf_neighbor_down
    - device_cpu_high
    - device_memory_high
    - f5_pool_member_down


alert_throttle:
  enabled: true
  cooldown_minutes: 10
  active_window_minutes: 5
  resolved_disable_auto_execute: true
  same_device_concurrency_limit: 1


safety_policy:
  enabled: true
  readonly_only: true
  max_commands_per_request: 5
  command_timeout_sec: 30
  audit_enabled: true

  # 命中这些设备时，只生成 plan，不自动执行。
  high_risk_devices: []

  allowed_capabilities:
    - show_interface_detail
    - show_interface_error_counters
    - show_interface_brief
    - show_portchannel_summary
    - show_lacp_neighbor
    - show_recent_logs
    - show_bgp_peer_detail
    - show_route_to_peer
    - ping_peer
    - show_bgp_config_snippet
    - show_ospf_peer_detail
    - show_device_cpu
    - show_device_memory
    - show_f5_pool_list
    - show_f5_pool_members
    - show_f5_pool_config
    - show_f5_connections
    - show_f5_performance

  allowed_command_prefixes:
    - "show "
    - "display "
    - "get "
    - "diagnose hardware deviceinfo "
    - "diagnose netlink "
    - "get router info "
    - "get system "
    - "get log "
    - "ping "
    - "traceroute "
    - "tmsh show "
    - "tmsh list "

  deny_command_patterns:
    - "^\s*conf(?:ig(?:ure)?)?\b"
    - "^\s*configure\b"
    - "^\s*set\s+"
    - "^\s*delete\s+"
    - "^\s*clear\s+"
    - "^\s*reset\s+"
    - "^\s*reload\b"
    - "^\s*reboot\b"
    - "^\s*shutdown\b"
    - "^\s*no\s+shutdown\b"
    - "^\s*write\b"
    - "^\s*copy\s+"
    - "^\s*commit\b"
    - "^\s*save\b"
    - "^\s*erase\b"
    - "^\s*bash\b"
    - "^\s*python\b"
    - "^\s*sudo\b"
    - ";"
    - "&&"
    - "\|\|"

# Prometheus 指标窗口证据接入示例
# 说明：
# 1. enabled=true 且 base_url 有效时，review 会自动查询告警前后窗口指标。
# 2. 默认按 ifHCInOctets / ifHCOutOctets / ifHighSpeed 生成 PromQL。
# 3. 如果你的 Prometheus 指标名或标签名不同，请修改 metric_names / label_names / queries。
# 4. 可用变量：
#    {instance} {interface} {interface_regex} {device_ip} {hostname} {job} {alarm_type}
prometheus:
  enabled: false
  base_url: "http://127.0.0.1:9090"
  timeout: 10
  lookback_minutes: 15
  lookahead_minutes: 5
  step: "60s"
  rate_window: "5m"
  high_threshold_percent: 80
  recovered_threshold_percent: 20
  metric_names:
    if_in_octets: "ifHCInOctets"
    if_out_octets: "ifHCOutOctets"
    if_speed_mbps: "ifHighSpeed"
  label_names:
    instance: "instance"
    if_name: "ifName"
  queries:
    interface_input_utilization_percent: ""
    interface_output_utilization_percent: ""
    interface_input_bps: ""
    interface_output_bps: ""
