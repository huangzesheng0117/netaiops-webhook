skill_name: device_memory_utilization_high
version: v8.4.0-cisco-memory-prometheus
family: device_memory_utilization_high
risk_level: readonly
readonly_only: true
default_auto_execute_command_limit: 15
allowed_tools:
- mcp_netmiko_run_show
- prometheus_range_query
- parser_parse_cli_output
profiles:
  cisco_nxos_memory_high:
    description: Cisco NX-OS memory high first-wave profile. Generic, readonly, no BGP assumption.
    max_commands_per_request: 15
    prometheus_evidence_preferred: true
    default_commands:
    - show clock
    - show version
    - show system resources
    - show processes memory
    - show system internal processes memory
    - show system internal kernel meminfo
    - show system internal kernel memory global
    - show system internal memory-alerts-log
    - show logging last 500
    - show system cores
    - show processes log
    - show ip route summary vrf all
    - show ip arp summary vrf all
    - show mac address-table count
    - show snmp
  cisco_iosxe_memory_high:
