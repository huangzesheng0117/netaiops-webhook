second_stage_triggers:
  bgp:
  - BGP Router
  - bgp
  - urib
  - ipfib
  - route count abnormal
  ospf:
  - OSPF Router
  - ospf
  - LSA
  - database
  isis:
  - isis
  - adjacency
  - database
  snmp:
  - SNMP ENGINE
  - snmpd
  - authentication failures
  - SNMP input fast increasing
  arp_mac:
  - ARP Input
  - netstack
  - mac address table abnormal
  - ARP table abnormal
  syslog:
  - syslogd
  - logging storm
  - message repeat
  ha_stack:
  - standby
  - SSO
  - stack member
  - supervisor
command_limits:
  max_commands_per_request: 15
  max_extra_rounds: 0
  timeout_seconds_per_command: 35
  continue_on_command_failure: true
forbidden_patterns:
- configure terminal
- conf t
- shutdown
- no shutdown
- clear
- reload
- delete
- erase
- debug
- copy
- write memory
- install
- request
notification_policy:
  template: 初步判断 / 告警含义分析 / 命令执行概况 / 命令分析 / 综合执行结果判断 / 建议
  hide_internal_orchestration: true
  forbidden_words_in_notification:
  - 第一批
  - 第二批
  - 第一波
  - 第二波
  - stage-1
  - stage-2
  command_overview: 列出成功执行命令清单和失败命令；失败命令必须单独列出。
  analysis: 聚合 Prometheus 历史趋势、总体内存、进程 RSS、cache/available、kernel/RAM FS、内存告警、core/crash/restart、表项规模、SNMP/管理面，不逐条解释命令用途。
