skill_name: device_memory_utilization_high
version: v8.4.0-cisco-memory-prometheus
profile: device_memory_usage
description: Cisco device memory usage Prometheus query mapping. Actual metric names depend on SNMP exporter and device MIB coverage.
lookback_minutes: 60
step_seconds: 60
compare_offset_minutes: 15
required_labels:
- device_ip
label_aliases:
  device_ip:
  - ip
  - device_ip
  - instance
  memory_pool:
  - ciscoMemoryPoolName
  - ciscoMemoryPoolType
  - hrStorageDescr
  - pool
queries:
  memory_usage_percent:
    description: Device memory usage percent from Cisco cseSysMemoryUtilization, cpmCPUMemoryUsed/Free, Cisco memory pool, HOST-RESOURCES-MIB, or generic memory metrics.
    unit: percent
    promql_candidates:
    - avg by (ip) (cseSysMemoryUtilization{ip="{{device_ip}}"})
    - avg by (instance) (cseSysMemoryUtilization{instance="{{device_ip}}"})
    - avg by (instance) (cseSysMemoryUtilization{instance=~"{{device_ip}}(:.*)?"})
    - 100 * avg by (ip) (cpmCPUMemoryUsed{ip="{{device_ip}}"}) / (avg by (ip) (cpmCPUMemoryUsed{ip="{{device_ip}}"}) + avg by (ip) (cpmCPUMemoryFree{ip="{{device_ip}}"}) )
    - 100 * avg by (instance) (cpmCPUMemoryUsed{instance="{{device_ip}}"}) / (avg by (instance) (cpmCPUMemoryUsed{instance="{{device_ip}}"}) + avg by (instance) (cpmCPUMemoryFree{instance="{{device_ip}}"}) )
    - 100 * avg by (instance) (cpmCPUMemoryUsed{instance=~"{{device_ip}}(:.*)?"}) / (avg by (instance) (cpmCPUMemoryUsed{instance=~"{{device_ip}}(:.*)?"}) + avg by (instance) (cpmCPUMemoryFree{instance=~"{{device_ip}}(:.*)?"})
      )
    - 100 * avg by (ip, ciscoMemoryPoolName) (ciscoMemoryPoolUsed{ip="{{device_ip}}"}) / (avg by (ip, ciscoMemoryPoolName) (ciscoMemoryPoolUsed{ip="{{device_ip}}"}) + avg by (ip, ciscoMemoryPoolName) (ciscoMemoryPoolFree{ip="{{device_ip}}"})
      )
    - 100 * avg by (instance, ciscoMemoryPoolName) (ciscoMemoryPoolUsed{instance="{{device_ip}}"}) / (avg by (instance, ciscoMemoryPoolName) (ciscoMemoryPoolUsed{instance="{{device_ip}}"}) + avg by (instance, ciscoMemoryPoolName)
      (ciscoMemoryPoolFree{instance="{{device_ip}}"}) )
    - 100 * avg by (ip, hrStorageDescr) (hrStorageUsed{ip="{{device_ip}}",hrStorageDescr=~".*(Memory|memory|RAM|Processor|DRAM).*"}) / avg by (ip, hrStorageDescr) (hrStorageSize{ip="{{device_ip}}",hrStorageDescr=~".*(Memory|memory|RAM|Processor|DRAM).*"})
    - 100 * avg by (instance, hrStorageDescr) (hrStorageUsed{instance="{{device_ip}}",hrStorageDescr=~".*(Memory|memory|RAM|Processor|DRAM).*"}) / avg by (instance, hrStorageDescr) (hrStorageSize{instance="{{device_ip}}",hrStorageDescr=~".*(Memory|memory|RAM|Processor|DRAM).*"})
    - avg by (ip) (memory_usage_percent{ip="{{device_ip}}"})
    - avg by (instance) (memory_usage_percent{instance="{{device_ip}}"})
    - avg by (ip) (device_memory_usage_percent{ip="{{device_ip}}"})
    - avg by (instance) (device_memory_usage_percent{instance="{{device_ip}}"})
judgement:
  sustained_high: memory usage remains high through the historical window.
  growing: memory usage keeps increasing, suggesting leak or table growth.
  periodic: memory usage rises periodically, suggesting scheduled SNMP walk, backup, automation or polling behavior.
  recovered: memory usage has recovered or dropped before investigation.
  prometheus_unavailable: Prometheus memory series unavailable; continue CLI evidence and state evidence boundary.
