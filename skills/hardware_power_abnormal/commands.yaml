      template: "show logging | include Power|PSU|failed|absent|fault"
      readonly: true
  cisco_iosxe:
    show_environment:
      template: "show environment"
      readonly: true
    show_environment_power:
      template: "show environment power"
      readonly: true
    show_recent_logs:
      template: "show logging | include Power|PSU|failed|absent|fault"
      readonly: true
  cisco_ios:
    show_environment:
      template: "show environment"
      readonly: true
    show_environment_power:
      template: "show environment power"
      readonly: true
    show_recent_logs:
      template: "show logging | include Power|PSU|failed|absent|fault"
      readonly: true
  aci:
    show_environment:
      template: "show environment"
      readonly: true
    show_environment_power:
      template: "show environment power"
      readonly: true
    show_recent_logs:
      template: "show logging | include Power|PSU|failed|absent|fault"
      readonly: true
command_limits:
