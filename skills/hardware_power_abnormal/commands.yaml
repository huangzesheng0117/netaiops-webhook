skill_name: hardware_power_abnormal
version: v6.3.0
family: hardware_power_abnormal
risk_level: readonly
allowed_tools:
  - mcp_netmiko_run_show
  - prometheus_range_query
  - parser_parse_cli_output
allowed_capabilities:
  - show_environment
  - show_environment_power
  - prometheus_range_query
