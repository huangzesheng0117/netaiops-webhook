skill_name: device_cpu_utilization_high
version: v8.3.0-cisco-cpu-prometheus
family: device_cpu_utilization_high
risk_level: readonly
readonly_only: true
default_auto_execute_command_limit: 15
note: Default auto-executed playbook command count must not exceed 15.
allowed_tools:
- mcp_netmiko_run_show
- prometheus_range_query
- parser_parse_cli_output
allowed_capabilities:
- show_clock
- show_version
- show_cpu_current
- show_cpu_history
- show_system_resources
- show_process_cpu
- show_process_memory
- show_recent_cpu_logs
- show_control_plane_policy
- show_interface_errors
- show_bgp_summary
- show_ospf_neighbors
- show_isis_adjacency
- show_snmp
- show_users
- show_feature
- show_punt_cause
- show_punt_rate_interfaces
- show_cpu_policer
- show_ip_traffic
- show_stp_detail
- show_mac_count
- show_qfp_utilization
- prometheus_cpu_history
- parse_cli_output
profiles:
  cisco_nxos_cpu_high:
    description: Cisco NX-OS CPU high utilization first-wave profile.
    max_commands_per_request: 15
    prometheus_evidence_required: false
    prometheus_evidence_preferred: true
    default_commands:
    - show clock
    - show system resources
    - show processes cpu sort
    - show processes cpu history
    - show version
    - show logging last 300 | include CPU|HIGH|BGP|OSPF|ISIS|STP|VPC|LACP|ETHPORT|BFD|SNMP|AAA|LOGIN
    - show processes memory sort
    - show interface counters errors
    - show policy-map interface control-plane
    - show ip bgp summary vrf all
    - show ip ospf neighbors vrf all
    - show isis adjacency
    - show snmp
    - show users
    - show feature
  cisco_iosxe_cpu_high:
    description: Cisco IOS-XE CPU high utilization first-wave profile.
    max_commands_per_request: 15
    prometheus_evidence_required: false
    prometheus_evidence_preferred: true
    default_commands:
    - show clock
    - show processes cpu sorted
    - show processes cpu history
    - show version
    - show logging | include CPU|HIGH|BGP|OSPF|EIGRP|STP|SPANTREE|LINEPROTO|LINK|BFD|SNMP|AAA|LOGIN
    - show processes memory sorted
    - show platform software status control-processor brief
    - show platform software process list switch active R0 sort
    - show platform software fed switch active punt cause summary
    - show platform software fed switch active punt rates interfaces
    - show platform hardware fed switch active qos queue stats internal cpu policer
    - show interfaces counters errors
    - show ip traffic
    - show snmp
    - show users
  cisco_ios_cpu_high:
    description: Cisco IOS CPU high utilization first-wave profile.
    max_commands_per_request: 15
    prometheus_evidence_required: false
    prometheus_evidence_preferred: true
    default_commands:
    - show clock
    - show processes cpu sorted
    - show processes cpu history
    - show version
    - show logging | include CPU|HIGH|BGP|OSPF|EIGRP|STP|SPANTREE|LINEPROTO|LINK|BFD|SNMP|AAA|LOGIN
    - show processes memory sorted
    - show interfaces counters errors
    - show ip interface brief
    - show spanning-tree detail | include ieee|occurr|from|executing
    - show mac address-table count
    - show ip traffic
    - show snmp
    - show policy-map control-plane
    - show ip bgp summary
    - show users
