command_limits:
  max_commands_per_request: 15
  max_extra_rounds: 0
  timeout_seconds_per_command: 30
  continue_on_command_failure: true
forbidden_patterns:
- configure terminal
- conf t
- shutdown
- no shutdown
- clear
- reload
- write memory
- copy running-config startup-config
- delete
- erase
- debug
notification_policy:
  template: 初步判断 / 告警含义分析 / 命令执行概况 / 命令分析 / 综合执行结果判断 / 建议
  hide_internal_orchestration: true
  forbidden_words_in_notification:
  - 第一批
  - 第二批
  - 第一波
  - 第二波
  - stage-1
  - stage-2
  command_overview: 列出成功执行命令清单和失败命令；失败命令必须单独列出。
  analysis: 聚合 Prometheus 历史趋势、当前 CPU、进程排行、日志、CoPP、SNMP、协议状态等证据，不逐条解释命令用途。
