skill_name: interface_down_or_oper_status
version: v9.1.0-cisco-interface-down
family: interface_down_or_oper_status
risk_level: readonly
readonly_only: true
auto_execute_allowed: true

allowed_tools:
  - mcp_netmiko_run_show
  - prometheus_range_query
  - parser_parse_cli_output

allowed_capabilities:
  - show_clock
  - show_interface_status_summary
  - show_ip_interface_brief
  - show_interface_detail
  - show_interface_config
  - show_errdisabled_status
  - show_errdisable_recovery
  - show_recent_interface_logs
