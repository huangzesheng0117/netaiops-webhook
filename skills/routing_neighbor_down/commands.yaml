command_limits:
  max_commands_per_request: 15
  max_extra_rounds: 0
  timeout_seconds_per_command: 20
  continue_on_command_failure: true
readonly_only: true
forbidden_patterns:
- clear
- conf t
- configure terminal
- copy running-config startup-config
- debug
- delete
- erase
- no shutdown
- reload
- shutdown
- write memory
default_auto_execute_command_limit: 15
note: Default auto-executed playbook command count must not exceed 15.
notification_policy:
  template: 初步判断 / 告警含义分析 / 命令执行概况 / 命令分析 / 综合执行结果判断 / 建议
  hide_internal_orchestration: true
  forbidden_words_in_notification:
  - 第一批
  - 第二批
  - 第一波
  - 第二波
  - stage-1
  - stage-2
  command_overview: 列出成功执行命令清单和失败命令；失败命令必须单独列出。
  analysis: 少解释命令用途，多聚合命令结果，重点输出判断依据和当前不能判断的边界。
profiles:
  bgp_neighbor_down:
    description: BGP neighbor abnormal profile. Physical interface checks are excluded.
    max_commands_per_request: 15
    physical_interface_checks: false
    default_commands:
    - show clock
    - show version
    - show feature | include bgp|bfd
    - show bgp ipv4 unicast summary vrf all
    - show bgp ipv4 unicast neighbors {peer_ip} vrf {vrf}
    - show logging logfile | include BGP|BFD
    - show running-config bgp
    - show ip route {peer_ip} vrf {vrf}
    - show forwarding route {peer_ip} vrf {vrf}
    - show bfd neighbors details
    - show bgp ipv4 unicast neighbors {peer_ip} advertised-routes vrf {vrf}
    - show bgp ipv4 unicast neighbors {peer_ip} routes vrf {vrf}
