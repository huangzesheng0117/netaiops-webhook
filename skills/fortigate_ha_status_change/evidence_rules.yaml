skill_name: fortigate_ha_status_change
version: v6.3.0
family: fortigate_ha_status_change
required_facts:
  - hostname
  - device_ip
  - ha_role
  - mcp_commands
preferred_facts:
  - ha_mode
  - ha_health_status
  - master_device
  - slave_device
  - cluster_uptime
  - prometheus_window_state
status_rules:
  active:
    condition: "Prometheus and device evidence indicate the condition is still abnormal"
    severity: warning
    message: "current evidence indicates the FortiGate alert is still active"
  recovered_or_transient:
    condition: "device evidence is normal while Prometheus fired in a previous window"
    severity: info
    message: "current evidence looks recovered or transient"
  inconclusive:
    condition: "required facts are missing or command output cannot be parsed"
    severity: warning
    message: "manual review is required"
manual_review_conditions:
  - "missing required facts"
  - "mcp command failed"
  - "parser status is error"
  - "Prometheus and device evidence conflict"
  - "VDOM or HA member context cannot be identified"
