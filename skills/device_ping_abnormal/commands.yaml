skill_name: device_ping_abnormal
version: v6.3.0
family: device_ping_abnormal
risk_level: readonly
allowed_tools:
  - mcp_netmiko_run_show
  - prometheus_range_query
  - parser_parse_cli_output
allowed_capabilities:
  - show_device_status
  - show_interface_summary
  - prometheus_range_query
  - parse_cli_output
platform_commands:
  cisco_nxos:
    show_device_status:
      template: "show version"
      readonly: true
    show_interface_summary:
      template: "show interface status"
      readonly: true
  cisco_iosxe:
    show_device_status:
      template: "show version"
      readonly: true
    show_interface_summary:
      template: "show interfaces status"
      readonly: true
  f5_tmos:
    show_device_status:
      template: "tmsh show sys version"
      readonly: true
    show_interface_summary:
      template: "tmsh show net interface"
      readonly: true
  fortios:
    show_device_status:
      template: "get system status"
      readonly: true
    show_interface_summary:
      template: "get system interface physical"
      readonly: true
  h3c:
    show_device_status:
      template: "display version"
      readonly: true
    show_interface_summary:
      template: "display interface brief"
      readonly: true
command_limits:
  max_commands_per_request: 6
  max_extra_rounds: 0
readonly_only: true
forbidden_patterns:
  - "configure"
  - "config"
  - "edit"
  - "set"
  - "delete"
  - "reload"
  - "reboot"
  - "shutdown"
  - "save"
  - "commit"
  - "debug"
