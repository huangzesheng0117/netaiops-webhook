skill_name: f5_connection_anomaly
version: v6.3.0
family: f5_connection_anomaly
required_facts:
  - hostname
  - device_ip
  - anomaly_direction
  - metric_name
  - mcp_commands
preferred_facts:
  - current_value
  - previous_value
  - change_ratio
  - virtual_server_top
  - pool_top
  - throughput_bps
  - prometheus_window_state
status_rules:
  spike_active:
    condition: "anomaly_direction is spike and current value remains high"
    severity: warning
    message: "connection metric is still spiking"
  drop_active:
    condition: "anomaly_direction is drop and current value remains much lower than baseline"
    severity: warning
    message: "connection metric is still dropping"
  recovered_or_transient:
    condition: "current value has returned close to baseline"
    severity: info
    message: "current evidence looks recovered or transient"
  inconclusive:
    condition: "baseline or current value is missing"
    severity: warning
    message: "manual review is required"
manual_review_conditions:
  - "missing current or previous value"
  - "mcp command failed"
  - "parser status is error"
  - "Prometheus and device evidence conflict"
  - "top virtual server or pool cannot be identified"
