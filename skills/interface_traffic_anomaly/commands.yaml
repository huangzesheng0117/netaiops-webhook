skill_name: interface_traffic_anomaly
version: v6.3.0
family: interface_traffic_anomaly
risk_level: readonly
allowed_tools:
  - mcp_netmiko_run_show
  - prometheus_range_query
  - parser_parse_cli_output
allowed_capabilities:
  - show_interface_detail
  - show_interface_status
  - show_interface_error_counters
  - show_port_channel_summary
  - show_recent_interface_logs
  - prometheus_range_query
  - parse_cli_output
platform_commands:
  cisco_iosxe:
    show_interface_detail:
      template: "show interface {interface}"
      readonly: true
    show_interface_status:
      template: "show interface {interface} status"
      readonly: true
    show_interface_error_counters:
      template: "show interface {interface} counters errors"
      readonly: true
    show_port_channel_summary:
      template: "show port-channel summary"
      readonly: true
    show_recent_interface_logs:
      template: "show logging | include {interface}|LINK|UPDOWN|flap|rate|traffic"
      readonly: true
  cisco_ios:
    show_interface_detail:
      template: "show interface {interface}"
      readonly: true
    show_interface_status:
      template: "show interface {interface} status"
      readonly: true
    show_interface_error_counters:
      template: "show interface {interface} counters errors"
      readonly: true
    show_port_channel_summary:
      template: "show etherchannel summary"
      readonly: true
    show_recent_interface_logs:
      template: "show logging | include {interface}|LINK|UPDOWN|flap|rate|traffic"
      readonly: true
  cisco_nxos:
    show_interface_detail:
      template: "show interface {interface}"
      readonly: true
    show_interface_status:
      template: "show interface {interface} status"
      readonly: true
    show_interface_error_counters:
      template: "show interface {interface} counters errors"
      readonly: true
    show_port_channel_summary:
      template: "show port-channel summary"
      readonly: true
    show_recent_interface_logs:
      template: "show logging | include {interface}|LINK|UPDOWN|flap|rate|traffic"
      readonly: true
command_limits:
  max_commands_per_request: 8
  max_extra_rounds: 0
readonly_only: true
forbidden_patterns:
  - "configure"
  - "conf t"
  - "clear"
  - "reload"
  - "shutdown"
  - "no shutdown"
  - "debug"
  - "write"
  - "copy"
  - "delete"
  - "erase"
