      template: "show ip sla configuration"
      readonly: true
    show_interface_detail:
      template: "show interface {interface}"
      readonly: true
    show_interface_error_counters:
      template: "show interface {interface} counters errors"
      readonly: true
    show_recent_interface_or_sla_logs:
      template: "show logging | include {interface}|IPSLAs|SLA|RTT|timeout|Timeout|LINK|UPDOWN|flap"
      readonly: true
  cisco_ios:
    show_ip_sla_statistics:
