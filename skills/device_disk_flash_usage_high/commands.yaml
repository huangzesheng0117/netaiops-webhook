profiles:
  cisco_nxos_disk_flash_high:
    description: Cisco NX-OS disk/bootflash high utilization first-wave profile. Readonly
      only.
    max_commands_per_request: 15
    prometheus_evidence_preferred: true
    default_commands:
    - show clock
    - show version
    - show boot
    - show boot variables
    - 'dir bootflash:'
    - dir bootflash:*.bin
    - dir bootflash:*.tar
    - dir bootflash:*.tgz
    - dir bootflash:*.gz
    - dir bootflash:*show*
    - dir bootflash:*tech*
    - dir bootflash:*core*
    - show system cores
    - 'dir log:'
    - show logging last 500 | include BOOTFLASH|bootflash|DISK|disk|space|No space|filesystem|core|crash|copy|write
    forbidden_cleanup_actions:
    - delete bootflash:<file>
    - delete bootflash:<directory>
  cisco_iosxe_disk_flash_high:
    description: Cisco IOS/IOS-XE flash high utilization first-wave profile. Readonly
      only.
    max_commands_per_request: 15
    prometheus_evidence_preferred: true
    default_commands:
    - show clock
    - show version
    - show boot
    - show running-config | include ^boot system
    - show file systems
    - 'dir flash:'
    - 'dir bootflash:'
    - 'dir crashinfo:'
    - 'dir stby-bootflash:'
    - show install summary
    - more flash:packages.conf
    - dir flash:*.bin
    - dir flash:*.pkg
    - show logging | include FLASH|flash|BOOTFLASH|bootflash|DISK|disk|space|No space|filesystem|crash|core|install|package
    forbidden_cleanup_actions:
    - delete
    - install remove inactive
    - request platform software package clean
    - request platform software package clean switch all
