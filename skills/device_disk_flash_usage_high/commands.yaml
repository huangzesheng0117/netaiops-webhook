command_limits:
  max_commands_per_request: 15
  max_extra_rounds: 0
  timeout_seconds_per_command: 30
  continue_on_command_failure: true
forbidden_patterns:
- configure terminal
- conf t
- shutdown
- no shutdown
- clear
- reload
- delete
- erase
- debug
- copy
- write memory
- install remove inactive
- request platform software package clean
notification_policy:
  template: 初步判断 / 告警含义分析 / 命令执行概况 / 命令分析 / 综合执行结果判断 / 建议
  hide_internal_orchestration: true
  forbidden_words_in_notification:
  - 第一批
  - 第二批
  - 第一波
  - 第二波
  - stage-1
  - stage-2
  command_overview: 列出成功执行命令清单和失败命令；失败命令必须单独列出。
  analysis: 聚合 Prometheus 历史趋势、文件系统空间、启动依赖、大文件类型、core/crash、日志和文件系统异常，不逐条解释命令用途。
commands:
- command: show clock
  purpose: 记录设备时间，用于和告警时间、日志时间、Prometheus 窗口对齐
  readonly: true
- command: show version
  purpose: 查看平台、版本、运行镜像和 uptime，确认当前启动依赖背景
  readonly: true
- command: show boot
  purpose: 查看当前 boot 变量，清理前必须确认当前启动镜像不可误删
  readonly: true
- command: show boot variables
  purpose: 补充查看 boot 变量细节和双引擎/备用引擎启动上下文
  readonly: true
- command: 'dir bootflash:'
  purpose: 一次性查看 bootflash 容量、剩余空间和根目录文件，后续由本地解析识别旧镜像、show-tech、core、压缩包等文件
  readonly: true
- command: 'dir log:'
  purpose: 查看日志文件系统目录和空间占用
  readonly: true
- command: show system cores
  purpose: 查看系统 core/crash 记录，判断是否存在可清理前需保留的故障证据
  readonly: true
- command: show logging last 300
  purpose: 查看近期日志，后续由 webhook 本地解析 filesystem、space、core、copy、write 等关键字
  readonly: true
- command: show file systems
  purpose: 查看设备文件系统列表和容量信息，确认 bootflash/log/crashinfo 等 filesystem 状态
  readonly: true
- command: show system internal flash
  purpose: 补充查看 NX-OS flash 内部状态；如设备不支持，失败不影响主结论
  readonly: true
max_auto_execute_commands: 10
notes:
- 不要使用 dir bootflash:*.bin / *.tar / *.tgz / *show* / *core* 等通配命令，因为无匹配文件时可能被设备或
  runner 判定为失败。
- '通过 dir bootflash: 的完整输出在本地解析旧镜像、show-tech、core、压缩包等文件类型。'
- 不要自动执行 delete、copy、erase、install remove inactive、package clean、clear、reload 等修改类命令。
