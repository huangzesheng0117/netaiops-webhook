skill_name: interface_utilization_high
version: v6.3.0
family: interface_or_link_utilization_high
risk_level: readonly

allowed_tools:
  - mcp_netmiko_run_show
  - prometheus_range_query
  - parser_parse_cli_output

allowed_capabilities:
  - show_interface_detail
  - show_interface_error_counters
  - show_interface_aggregation
  - prometheus_interface_window
  - parse_cli_output

platform_commands:
  cisco_iosxe:
    show_interface_detail:
      template: "show interfaces {interface}"
      parser: cisco_show_interfaces
      readonly: true

    show_interface_error_counters:
      template: "show interfaces {interface} counters errors"
      parser: cisco_show_interfaces_counters_errors
      readonly: true

    show_interface_aggregation:
      template: "show etherchannel summary"
      parser: cisco_etherchannel_summary
      readonly: true

  cisco_ios:
    show_interface_detail:
      template: "show interfaces {interface}"
      parser: cisco_show_interfaces
      readonly: true

    show_interface_error_counters:
      template: "show interfaces {interface} counters errors"
      parser: cisco_show_interfaces_counters_errors
      readonly: true

    show_interface_aggregation:
      template: "show etherchannel summary"
      parser: cisco_etherchannel_summary
      readonly: true

command_limits:
  max_commands_per_request: 8
  max_extra_rounds: 0
  readonly_only: true

forbidden_patterns:
  - "configure terminal"
  - "conf t"
  - "shutdown"
  - "no shutdown"
  - "clear counters"
  - "reload"
  - "write memory"
  - "copy running-config startup-config"
  - "delete"
  - "erase"
  - "debug"
