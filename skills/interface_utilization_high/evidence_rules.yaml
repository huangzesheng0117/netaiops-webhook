skill_name: interface_utilization_high
version: v9.5.0-cisco-interface-utilization-high
family: interface_or_link_utilization_high

required_facts:
  - hostname
  - device_ip
  - interfaces
  - traffic_direction
  - capacity_bps
  - prometheus_window_state
  - command_results

preferred_facts:
  - aggregate_in_bps
  - aggregate_out_bps
  - aggregate_in_util_percent
  - aggregate_out_util_percent
  - member_interfaces
  - member_interface_rates
  - if_oper_status
  - output_drops
  - output_discards
  - input_errors
  - crc_errors
  - qos_policy_drop
  - police_exceeded
  - port_channel_state
  - lacp_state
  - trunk_state
  - stp_state
  - vlan_state
  - transceiver_state
  - storm_control_state

status_rules:
  aggregate_high_no_error:
    condition: "Aggregate utilization is high but member interfaces have no error/drop/QoS evidence."
    severity: info
    message: "normal traffic peak, capacity pressure or path shift is more likely"
  aggregate_high_with_drops:
    condition: "Aggregate utilization is high and output drops/discards or QoS drops increase."
    severity: warning
    message: "egress congestion or QoS policing is more likely"
  aggregate_high_with_physical_errors:
    condition: "CRC/FCS/input errors increase on one or more member interfaces."
    severity: warning
    message: "physical layer quality issue should be prioritized"
  monitoring_mismatch:
    condition: "CLI rates and Prometheus aggregate rates are inconsistent."
    severity: warning
    message: "check monitoring object, sampling, SNMP ifIndex, counter reset or aggregate capacity"
  instant_spike_or_recovered:
    condition: "Prometheus max exceeded threshold but current utilization is below threshold."
    severity: info
    message: "instant spike or already recovered"
