playbook_id: f5_connection_capacity_high
match:
  vendor: f5
  alertname_regex: '^(活动连接数|新建连接数\(TCP\)|F5活动连接数|F5新建连接数\(TCP\))$'
execution:
  readonly_only: true
  auto_execute_allowed: true
  max_commands: 6
  commands:
    - "tmsh show sys performance connections"
    - "tmsh show sys performance throughput"
    - "tmsh show ltm virtual"
    - "tmsh show ltm pool"
