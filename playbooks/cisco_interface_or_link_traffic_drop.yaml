playbook_id: cisco_interface_or_link_traffic_drop
match:
  vendor: cisco
  playbook_type: interface_or_link_traffic_drop
execution:
  commands:
  - show interface {interface}
  - show interface {interface} counters errors
  - show port-channel summary
  - show lacp neighbor
  - show logging last 50
  readonly_only: true
  auto_execute_allowed: true
commands:
- order: 1
  command: show interface {interface}
  reason: check interface state/rate/counters
  risk: low
  readonly: true
- order: 2
  command: show interface {interface} counters errors
  reason: check error/discard counters
  risk: low
  readonly: true
- order: 3
  command: show port-channel summary
  reason: check port-channel/member status
  risk: low
  readonly: true
- order: 4
  command: show lacp neighbor
  reason: check LACP peer state
  risk: low
  readonly: true
- order: 5
  command: show logging last 50
  reason: check recent flap/error logs
  risk: low
  readonly: true
readonly_only: true
auto_execute_allowed: true
prometheus_evidence_first:
  enabled: true
  backend_preference: prometheus_mcp
  fallback: http_api
  evidence_profile: interface_traffic
  query_names:
  - in_bps
  - out_bps
  lookback_minutes: 15
  compare_offset_minutes: 5
  step_seconds: 60
  max_candidates_per_query: 1
  sidecar_overall_timeout_seconds: 30
  required_labels:
  - device_ip
  - if_name
  stop_device_cli_if_not_confirmed: false
  unavailable_policy: continue_cli_evidence
  note: 'v8 runtime metadata: traffic evidence uses 1m PromQL rate window; oper_status is not queried for traffic-only alerts.'
  sidecar_parallel_workers: 3
  rate_window: 1m
device_evidence_after_prometheus:
  enabled: true
  commands:
  - show interface {interface_each}
  - show interface {interface_each} counters errors
  - show port-channel summary
  - show lacp neighbor
