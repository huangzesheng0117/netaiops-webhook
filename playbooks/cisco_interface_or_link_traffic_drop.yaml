playbook_id: cisco_interface_or_link_traffic_drop
family: interface_traffic_anomaly
skill_name: interface_traffic_anomaly
description: Cisco interface/link/DCI traffic drop readonly investigation playbook alias.
  It reuses interface_traffic_anomaly skill and evidence logic.
match:
  vendor: cisco
  alertname_regex: (接口.?链路.?流量.?突降|骨干网.*流量.*突降|互联网.*流量.*突降|DCI.*流量.*突降|骨干.*利用率.*突降|互联网.*利用率.*突降|Traffic.*Drop)
  content_regex: (流量|带宽|利用率|bps|Mbps|Gbps|突降|下降|归零|入向|出向|input|output|inbound|outbound)
target_fields:
  device_ip:
  - device_ip
  - ip
  - instance
  hostname:
  - hostname
  - sysName
  - device
  interface:
  - interface
  - ifName
  - if_name
  - object_name
  - port
  direction:
  - direction
  - traffic_direction
  - alarm_direction
execution:
  readonly_only: true
  auto_execute_allowed: true
  max_commands: 14
  commands:
  - show clock
  - show interface status
  - show interface {interface}
  - show running-config interface {interface}
  - show logging last 500 | include {interface}|ETHPORT|IF_DOWN|IF_UP|ERR|ERRDISABLE|UDLD|STP|SPANTREE|SFP|XCVR|TRANSCEIVER|LACP|VPC|QOS|DROP|flap
  - show interface counters errors
  - show interface {interface} counters
  - show policy-map interface {interface}
  - show interface {interface} transceiver details
  - show port-channel summary
  - show lacp neighbor
  - show interface trunk
  - show spanning-tree interface {interface} detail
  - show vlan brief
prometheus_evidence_first:
  enabled: true
  backend_preference: prometheus_mcp
  fallback: http_api
  evidence_profile: interface_traffic_anomaly
  query_names:
  - in_bps
  - out_bps
  - if_oper_status
  - in_errors_delta
  - out_discards_delta
  lookback_minutes: 15
  compare_offset_minutes: 5
  step_seconds: 60
  max_candidates_per_query: 2
  sidecar_overall_timeout_seconds: 120
  sidecar_parallel_workers: 4
  required_labels:
  - device_ip
  - interface
  stop_device_cli_if_not_confirmed: false
  unavailable_policy: continue_cli_evidence
  note: 'v9 interface traffic drop evidence alias: reuse interface_traffic_anomaly
    profile.'
analysis_policy:
  covered_alert_classes:
  - DCI线路流量突降
  - DCI专线流量突降
  goal: 接口/链路流量突降类告警先判断是否真实突降，再区分接口 flap、监控采集、计数器清零、路由切走、QoS限速、STP/vPC/聚合变化、对端停止发送或业务源停止。
  first_wave_limits:
    max_commands: 14
    readonly_only: true
    no_config_change: true
    no_clear_counter: true
notification_policy:
  template: v8_v9_standard
  command_display: 每条命令各自占一行
