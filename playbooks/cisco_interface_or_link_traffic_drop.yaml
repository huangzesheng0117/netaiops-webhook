playbook_id: cisco_interface_or_link_traffic_drop
match:
  vendor: cisco
  playbook_type: interface_or_link_traffic_drop
execution:
  commands:
  - show interface {interface}
  - show interface {interface} counters errors
  - show port-channel summary
  - show lacp neighbor
  - show logging last 50
  readonly_only: true
  auto_execute_allowed: true
commands:
- order: 1
  command: show interface {interface}
  reason: check interface state/rate/counters
  risk: low
  readonly: true
- order: 2
  command: show interface {interface} counters errors
  reason: check error/discard counters
  risk: low
  readonly: true
- order: 3
  command: show port-channel summary
  reason: check port-channel/member status
  risk: low
  readonly: true
- order: 4
  command: show lacp neighbor
  reason: check LACP peer state
  risk: low
  readonly: true
- order: 5
  command: show logging last 50
  reason: check recent flap/error logs
  risk: low
  readonly: true
readonly_only: true
auto_execute_allowed: true

# V7_12_PROMETHEUS_FIRST_TRAFFIC_DROP BEGIN
prometheus_evidence_first:
  enabled: true
  purpose: "Confirm traffic drop from Prometheus time series before device-side CLI evidence collection."
  lookback_minutes: 15
  step_seconds: 30
  required_series:
    - input_rate_bps
    - output_rate_bps
    - interface_speed_or_bandwidth_bps
  judgement:
    confirmed_drop: "Current window traffic is significantly lower than previous baseline."
    not_confirmed: "Prometheus trend does not confirm the drop; treat as transient, recovered or monitoring artifact."
device_evidence_after_prometheus:
  enabled: true
  commands:
    - "show interface {interface_each}"
    - "show interface {interface_each} counters errors"
    - "show port-channel summary"
    - "show lacp neighbor"
# V7_12_PROMETHEUS_FIRST_TRAFFIC_DROP END
