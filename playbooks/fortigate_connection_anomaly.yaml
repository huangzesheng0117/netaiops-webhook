playbook_id: fortigate_connection_anomaly
match:
  vendor: fortigate
  alertname_regex: '^(活动连接数突增|活动连接数突降|新建连接数突增|新建连接数突降|飞塔防火墙活动连接数突增|飞塔防火墙活动连接数突降|飞塔防火墙新建连接数突增|飞塔防火墙新建连接数突降|FortiGate活动连接数突增|FortiGate活动连接数突降|FortiGate新建连接数突增|FortiGate新建连接数突降)$'
execution:
  readonly_only: true
  auto_execute_allowed: true
  max_commands: 6
  commands:
    - "get system performance status"
    - "diagnose sys session stat"
    - "diagnose sys session full-stat"
    - "get system status"
