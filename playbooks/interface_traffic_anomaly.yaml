playbook_id: interface_traffic_anomaly
family: interface_traffic_anomaly
skill_name: interface_traffic_anomaly
description: Generic alias for Cisco interface traffic spike/drop anomaly. It is kept
  for backward compatibility with existing classifier references.
match:
  vendor: cisco
  alertname_regex: (接口.?链路.?流量.?突增|接口.?链路.?流量.?突降|接口.?链路.?流量.?突增.?突降|骨干网.*流量.*突增|骨干网.*流量.*突降|互联网.*流量.*突增|互联网.*流量.*突降|Traffic.*Spike|Traffic.*Drop|Traffic.*Anomaly)
  content_regex: (流量|带宽|利用率|bps|Mbps|Gbps|突增|突降|入向|出向|input|output)
target_fields:
  device_ip:
  - device_ip
  - ip
  - instance
  hostname:
  - hostname
  - sysName
  - device
  interface:
  - interface
  - ifName
  - if_name
  - object_name
  - port
  direction:
  - direction
  - traffic_direction
  - alarm_direction
execution:
  readonly_only: true
  auto_execute_allowed: true
  max_commands: 14
  commands:
  - show clock
  - show interface status
  - show interface {interface}
  - show running-config interface {interface}
  - show logging last 500 | include {interface}|ETHPORT|IF_DOWN|IF_UP|ERR|ERRDISABLE|UDLD|STP|SPANTREE|SFP|XCVR|TRANSCEIVER|LACP|VPC|QOS|DROP|flap
  - show interface counters errors
  - show interface {interface} counters
  - show policy-map interface {interface}
  - show interface {interface} transceiver details
  - show port-channel summary
  - show lacp neighbor
  - show interface trunk
  - show spanning-tree interface {interface} detail
  - show vlan brief
prometheus_evidence_first:
  enabled: true
  backend_preference: prometheus_mcp
  fallback: http_api
  evidence_profile: interface_traffic_anomaly
  query_names:
  - in_bps
  - out_bps
  - if_oper_status
  - in_errors_delta
  - out_discards_delta
  lookback_minutes: 15
  compare_offset_minutes: 5
  step_seconds: 60
  max_candidates_per_query: 2
  sidecar_overall_timeout_seconds: 120
  sidecar_parallel_workers: 4
  required_labels:
  - device_ip
  - interface
  stop_device_cli_if_not_confirmed: false
  unavailable_policy: continue_cli_evidence
analysis_policy:
  goal: 兼容旧 interface_traffic_anomaly playbook id，实际逻辑同 cisco_interface_traffic_anomaly。
notification_policy:
  template: v8_v9_standard
  command_display: 每条命令各自占一行
