playbook_id: cisco_interface_utilization_high
family: interface_or_link_utilization_high
skill_name: interface_utilization_high
description: Cisco interface/link utilization high readonly playbook, supporting single
  interface and multi-interface aggregate circuit utilization. v9.5 conflict-fixed
  version.
match:
  vendor: cisco
  alertname_regex: (接口.?链路.?利用率高|接口.?利用率高|链路.?利用率高|利用率超过|利用率高|利用率-入向|利用率-出向|接口利用率-入向|接口利用率-出向|线路利用率-入向|线路利用率-出向|.*利用率.*入向|.*利用率.*出向|带宽利用率|bandwidth.*utilization.*high|utilization.*high|WG88互联网线路_电信_100M_利用率)
  content_regex: (利用率|带宽|bps|Mbps|Gbps|超过|高于|入向|出向|input|output|inbound|outbound)
target_fields:
  device_ip:
  - device_ip
  - ip
  - instance
  hostname:
  - hostname
  - sysName
  - device
  interface:
  - interface
  - ifName
  - if_name
  - object_name
  interfaces:
  - interfaces
  - interface_list
  - ifName_list
  interface_regex:
  - interface_regex
  - if_regex
  direction:
  - direction
  - traffic_direction
  - alarm_direction
  capacity_bps:
  - capacity_bps
  - link_capacity_bps
  - bandwidth_bps
execution:
  readonly_only: true
  auto_execute_allowed: true
  max_commands: 30
  commands:
  - show clock
  - show ip interface brief
  - show interfaces status
  - show logging | include {interface}|LINEPROTO|LINK|ERR|ERRDISABLE|UDLD|SPANTREE|STP|LACP|PAGP|QOS|POLICE|DROP|TRANSCEIVER|SFP|flap
  - show interfaces counters errors
  - show etherchannel summary
  - show lacp neighbor
  - show interfaces trunk
  - show vlan brief
  - show interfaces {interface_each}
  - show running-config interface {interface_each}
  - show interfaces {interface_each} counters
  - show policy-map interface {interface_each}
  - show interfaces {interface_each} transceiver detail
  - show spanning-tree interface {interface_each} detail
  - show mac address-table interface {interface_each}
prometheus_evidence_first:
  enabled: true
  backend_preference: prometheus_mcp
  fallback: http_api
  evidence_profile: interface_utilization_high
  query_names:
  - in_bps
  - out_bps
  - in_util_percent
  - out_util_percent
  - if_oper_status
  - in_errors_delta
  - out_discards_delta
  lookback_minutes: 15
  compare_offset_minutes: 5
  step_seconds: 60
  max_candidates_per_query: 2
  sidecar_overall_timeout_seconds: 150
  sidecar_parallel_workers: 4
  required_labels:
  - device_ip
  - interface_regex
  stop_device_cli_if_not_confirmed: false
  unavailable_policy: continue_cli_evidence
  rate_window: 1m
  note: 'v9.5: utilization high evidence uses aggregate interface_regex. For WG88电信100M,
    interface_regex=Te1/0/1|Te2/0/1 and capacity_bps=100000000.'
analysis_policy:
  goal: 先确认利用率高是否真实、是否持续、方向是否正确、是否已经恢复；再结合 CLI 当前速率、错误包、drop、QoS、聚合、VLAN/STP、光模块、监控口径和业务路径判断。
  multi_interface_policy:
    enabled: true
    rule: 如果告警对象是逻辑链路/运营商线路/聚合统计口径，并且关联多个物理接口，必须将多个接口的流量相加后计算利用率。设备命令也必须分别对每个成员接口取证。
    special_cases:
      WG88互联网线路_电信_100M_利用率:
        device: WG404-H0304-C95-INT-ACC
        device_ip: 10.189.250.8
        interfaces:
        - Te1/0/1
        - Te2/0/1
        interface_regex: Te1/0/1|Te2/0/1
        capacity_bps: 100000000
        direction: out
  judgement_order:
  - 先通过 Prometheus 窗口证据确认总 in_bps/out_bps、总利用率百分比、当前值、5分钟前对比值、窗口最大/最小/平均。
  - 如果是多接口告警，必须按接口集合聚合 Prometheus 流量，不得只看单个接口。
  - 对每个成员接口执行 CLI 取证，分别确认 input/output rate、errors、drops、policy-map、光模块、STP/MAC/storm-control。
  - 如果 CLI rate 与 Prometheus 聚合值不一致，优先核查监控口径、SNMP ifIndex、采样周期、接口映射、是否重复统计 Port-channel
    和成员口。
  - 利用率高但无 drop/error，可偏向正常业务高峰、容量不足、链路切流或备份同步。
  - 利用率高且 output drops/discards/QoS drop 增长，优先判断出口拥塞、队列或限速。
  - 利用率高且 CRC/FCS/input error 增长，优先排查物理链路、光模块、线缆、对端口。
  - 若单成员高而总聚合不高，优先考虑哈希不均；若成员减少，剩余成员利用率升高属于预期结果。
  - 若广播/组播/未知单播高，排查二层风暴、组播异常、未知单播泛洪、环路。
  - 若接口无异常但持续高，进入容量评估、业务源、NetFlow、ACL 计数、路由路径和对端设备排查。
  result_split:
    high_but_no_error: 利用率高但无 drop/error，更偏向正常业务高峰、容量不足、业务切流或备份同步。
    high_with_output_drops: 利用率高且 output drops/discards 或 QoS drop 增长，偏向出口拥塞或策略限速。
    high_with_crc_fcs: 利用率高且 CRC/FCS/input error 增长，偏向物理链路质量问题。
    aggregate_circuit_high: 多接口聚合链路利用率高时，必须用成员接口流量总和与告警容量计算，不得只看单接口。
    cli_monitor_mismatch: CLI 与 Prometheus 不一致时，优先排查监控口径、采样、ifIndex、接口映射、计数器清零。
  first_wave_limits:
    max_commands: 30
    readonly_only: true
    no_config_change: true
    no_clear_counter: true
    no_debug: true
    no_shutdown: true
notification_policy:
  template: v9_interface_utilization_high_standard
  command_display: 每条命令各自占一行
  required_sections:
  - 根据告警内容初步判断
  - 告警含义分析
  - 命令执行概况
  - 命令分析
  - Prometheus窗口证据
  - 综合执行结果判断
  - 建议
