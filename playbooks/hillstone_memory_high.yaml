playbook_id: hillstone_memory_high
match:
  vendor: hillstone
  alertname_regex: '^(内存利用率|山石防火墙内存利用率|Hillstone内存利用率)$'
execution:
  readonly_only: true
  auto_execute_allowed: true
  max_commands: 6
  commands:
    - "show system resource"
    - "show system resource history"
    - "show session generic"
    - "show ha cluster"
