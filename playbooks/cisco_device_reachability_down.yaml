playbook_id: cisco_device_reachability_down
family: cisco_device_reachability_down
match:
  vendor: cisco
  alertname_regex: '^(up)$'
reachability_precheck:
  required: true
  order:
    - local_ping_management_ip
    - ssh_login_check
    - readonly_health_inspection
  stop_if_ping_failed: true
  stop_if_ssh_failed: true
  conclusion_if_ping_failed: "管理 IP ping 不通，优先判断设备下电、死机、管理链路中断或采集路径中断；不继续执行设备侧 CLI。"
  conclusion_if_ssh_failed: "管理 IP 可 ping 通但 SSH 登录失败，优先判断设备管理面、AAA、CPU/内存高负载或 SSH 服务异常。"
execution:
  readonly_only: true
  auto_execute_allowed: true
  max_commands: 8
  commands:
    - "show version"
    - "show clock"
    - "show processes cpu"
    - "show processes memory"
    - "show interface mgmt0"
    - "show ip interface brief"
    - "show logging | include mgmt|MGMT|SSH|LOGIN|CPU|MEMORY|UPDOWN|DOWN|reload|RELOAD"
    - "show bgp summary"
