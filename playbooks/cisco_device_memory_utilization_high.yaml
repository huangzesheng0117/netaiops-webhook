prometheus_evidence_first:
  enabled: true
  backend_preference: prometheus_mcp
  fallback: http_api
  evidence_profile: device_memory_usage
  query_names:
  - memory_usage_percent
  lookback_minutes: 60
  compare_offset_minutes: 15
  step_seconds: 60
  sidecar_overall_timeout_seconds: 30
  max_candidates_per_query: 8
  required_labels:
  - device_ip
  unavailable_policy: continue_cli_evidence
  stop_device_cli_if_not_confirmed: false
  sidecar_parallel_workers: 2
  note: Memory high alerts should use Prometheus history when available. Prometheus unavailable must not block CLI evidence. Nexus memory high must distinguish used memory from available/cache.
analysis_policy:
  max_auto_execute_commands: 15
  notification_template: 统一咚咚模板：初步判断、告警含义分析、命令执行概况、命令分析、综合执行结果判断、建议。
  command_overview_policy: 命令执行概况列出成功执行命令清单和失败命令；失败命令必须单独列出。
  analysis_language_policy: 不要逐条解释命令用途；命令分析应聚合 Prometheus 历史趋势、总体内存、进程 RSS、cache/available、kernel/RAM FS、内存告警、core/crash/restart、表项规模、SNMP/管理面等证据。
  primary_judgement_flow:
  - 先用 Prometheus 历史窗口判断内存是瞬时峰值、周期性峰值、持续增长、持续高位还是当前已恢复。
  - NX-OS 必须区分 used 高和 available/cache 是否仍充足，避免把 page cache 误判为真实故障。
  - 再用 CLI 判断当前 memory status、free/available、cache、kernel/slab/RAM FS、进程 RSS 是否异常。
  - 再判断是否存在低内存故障证据：MALLOCFAIL、Low memory、No memory、OOM、core、crash、sysmgr restart、watchdog。
  - 再判断是否为进程型问题：snmpd/SNMP、ARP/netstack、syslogd、vPC/lacp/ethpm、urib/ipfib/l2rib、iosd 等。
  - 再判断是否为表项规模问题：路由表、ARP 表、MAC 表异常增长。
  - 第一批不默认展开 BGP/OSPF/ISIS 细节；只有进程或表项证据指向对应协议后，第二阶段再补协议专项命令。
  - 最终结论必须说明当前证据边界：Prometheus 是否有历史数据、CLI 是否有失败命令、是否能区分 cache 和真实内存紧张。
  second_stage_policy:
    bgp: 仅当 bgp/BGP Router/urib/ipfib 等进程或路由规模异常时，再进入 BGP 专项取证。
    ospf_isis: 仅当 ospf/isis 进程、邻接或数据库规模异常时，再进入 IGP 专项取证。
    snmp: 当 snmpd/SNMP ENGINE 高或 show snmp 显示请求/认证失败异常时，进入 SNMP 专项分析。
    arp_mac: 当 ARP/MAC 表项异常增长或快速变化时，进入二层/网关规模专项分析。
    ha_stack: 当 active/standby 或堆叠成员状态不一致时，再补 HA/Stack 成员级资源取证。
  failure_policy: 任何单条只读命令失败时不得阻断后续命令；最终结论中只列失败命令及影响。
  forbidden_actions:
  - clear
  - reload
  - debug
  - configure
  - process restart
  - write memory
  - delete
  - copy
