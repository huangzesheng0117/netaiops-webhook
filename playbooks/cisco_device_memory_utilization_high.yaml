playbook_id: cisco_device_memory_utilization_high
match:
  vendor: cisco
  alertname_regex: ^(Cisco设备内存利用率异常|Cisco设备内存高|Cisco Memory High|Cisco Memory Utilization High|Device Memory High|device_memory_utilization_high|cisco_device_memory_utilization_high|memory_high)$
family: device_memory_utilization_high
skill_name: device_memory_utilization_high
description: Cisco device memory high utilization readonly investigation playbook with Prometheus memory history evidence.
readonly_only: true
auto_execute_allowed: true
default_command_scope: cisco_nxos_memory_first_wave_15_commands
execution:
  readonly_only: true
  auto_execute_allowed: true
  max_commands: 15
  commands: &id001
  - show clock
  - show version
  - show system resources
  - show processes memory
  - show system internal processes memory
  - show system internal kernel meminfo
  - show system internal kernel memory global
  - show system internal memory-alerts-log
  - show logging last 500
  - show system cores
  - show processes log
  - show ip route summary vrf all
  - show ip arp summary vrf all
  - show mac address-table count
  - show snmp
commands:
- order: 1
  command: show clock
  reason: record device time for alert, log and Prometheus correlation
  risk: low
  readonly: true
  timeout_sec: 35
- order: 2
  command: show version
  reason: check model, NX-OS version, uptime and image context
  risk: low
  readonly: true
  timeout_sec: 35
- order: 3
  command: show system resources
  reason: check overall CPU, process count, memory usage and memory status
  risk: low
  readonly: true
  timeout_sec: 35
- order: 4
  command: show processes memory
  reason: check NX-OS process memory allocation and memory limit pressure
  risk: low
  readonly: true
  timeout_sec: 35
- order: 5
  command: show system internal processes memory
  reason: check process RSS to identify real resident memory consumers
  risk: low
  readonly: true
  timeout_sec: 35
- order: 6
  command: show system internal kernel meminfo
  reason: distinguish MemFree, Cached, Available, Slab and Mapped memory
  risk: low
  readonly: true
  timeout_sec: 35
- order: 7
  command: show system internal kernel memory global
  reason: distinguish Kernel/App memory and RAM FS memory
  risk: low
  readonly: true
  timeout_sec: 35
- order: 8
  command: show system internal memory-alerts-log
  reason: check platform memory alert history
  risk: low
  readonly: true
  timeout_sec: 35
- order: 9
  command: show logging last 500
  reason: collect recent logs for OOM, low memory, core, crash, restart and sysmgr events; parse locally
  risk: low
  readonly: true
  timeout_sec: 35
- order: 10
  command: show system cores
  reason: check recent core files and process crash evidence
  risk: low
  readonly: true
  timeout_sec: 35
- order: 11
  command: show processes log
  reason: check process restart or abnormal exit evidence
  risk: low
  readonly: true
  timeout_sec: 35
- order: 12
  command: show ip route summary vrf all
  reason: check route scale across VRFs without assuming BGP is enabled
  risk: low
  readonly: true
  timeout_sec: 35
- order: 13
  command: show ip arp summary vrf all
  reason: check ARP scale across VRFs
  risk: low
  readonly: true
  timeout_sec: 35
- order: 14
  command: show mac address-table count
  reason: check MAC table scale
  risk: low
  readonly: true
  timeout_sec: 35
- order: 15
  command: show snmp
  reason: check SNMP management-plane pressure and authentication failures
  risk: low
  readonly: true
  timeout_sec: 35
