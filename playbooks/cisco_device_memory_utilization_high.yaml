  - show clock
  - show version
  - show memory
  - show memory statistics
  - show processes memory sorted
  - show processes memory detailed sorted
  - show memory statistics history table
  - show memory failures alloc
  - show memory processor fragment
  - show logging | include MEMORY|Memory|MALLOC|malloc|MALLOCFAIL|LOWMEM|Low memory|No memory|SYS-2-MALLOCFAIL|crash|core|restart|OOM|watchdog
