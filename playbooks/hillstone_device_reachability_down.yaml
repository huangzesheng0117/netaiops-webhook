playbook_id: hillstone_device_reachability_down
family: hillstone_device_reachability_down
match:
  vendor: hillstone
  alertname_regex: '^(up)$'
reachability_precheck:
  required: true
  order:
    - local_ping_management_ip
    - ssh_login_check
    - readonly_health_inspection
  stop_if_ping_failed: true
  stop_if_ssh_failed: true
  conclusion_if_ping_failed: "管理 IP ping 不通，优先判断 Hillstone 设备下电、死机、管理链路中断、HA 切换或采集路径中断。"
  conclusion_if_ssh_failed: "管理 IP 可 ping 通但 SSH 登录失败，优先判断管理面、CPU/内存压力、SSH 服务或认证异常。"
execution:
  readonly_only: true
  auto_execute_allowed: true
  max_commands: 8
  commands:
    - "show version"
    - "show system resource"
    - "show system resource history"
    - "show interface"
    - "show route"
    - "show ha cluster"
    - "show log"
