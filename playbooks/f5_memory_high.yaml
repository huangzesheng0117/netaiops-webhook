playbook_id: f5_memory_high
match:
  vendor: f5
  alertname_regex: "^(全局内存利用率|TMM内存利用率|F5全局内存利用率|F5TMM内存利用率)$"
execution:
  readonly_only: true
  auto_execute_allowed: true
  max_commands: 6
  commands:
    - "tmsh show sys memory"
    - "tmsh show sys tmm-info"
    - "tmsh show sys performance system"
