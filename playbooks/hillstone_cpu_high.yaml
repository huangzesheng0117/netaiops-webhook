playbook_id: hillstone_cpu_high
match:
  vendor: hillstone
  alertname_regex: '^(CPU利用率|山石防火墙CPU利用率|Hillstone CPU利用率)$'
execution:
  readonly_only: true
  auto_execute_allowed: true
  max_commands: 6
