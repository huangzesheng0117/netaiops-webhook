playbook_id: f5_optical_power_abnormal
match:
  vendor: f5
  alertname_regex: '^(收光功率|发光功率|F5收光功率|F5发光功率|F5光功率异常|F5光模块光功率异常)$'
execution:
  readonly_only: true
  auto_execute_allowed: true
  max_commands: 6
  commands:
    - "tmsh show net interface"
    - "tmsh show sys hardware"
    - "tmsh show sys chassis"
