playbook_id: cisco_interface_traffic_anomaly
match:
  vendor: cisco
  alertname_regex: '^(互联网线路流量突增|互联网线路流量突降|互联网链路流量突增|互联网链路流量突降|.*流量突增|.*流量突降)$'
execution:
  readonly_only: true
  auto_execute_allowed: true
  max_commands: 6
  commands:
    - "show interface {interface_each}"
    - "show interface {interface_each} status"
    - "show interface {interface_each} counters errors"
    - "show port-channel summary"
    - "show logging | include {interface_each}|LINK|UPDOWN|flap|rate|traffic"

# V7_12_PROMETHEUS_FIRST_TRAFFIC_ANOMALY BEGIN
prometheus_evidence_first:
  enabled: true
  purpose: "Confirm traffic spike/drop from Prometheus time series before device-side CLI evidence collection."
  lookback_minutes: 15
  step_seconds: 30
  required_series:
    - input_rate_bps
    - output_rate_bps
    - interface_speed_or_bandwidth_bps
  judgement:
    confirmed_spike: "Current window traffic is significantly higher than previous baseline."
    confirmed_drop: "Current window traffic is significantly lower than previous baseline."
    not_confirmed: "Prometheus trend does not confirm the spike/drop; treat as transient, recovered or monitoring artifact."
device_evidence_after_prometheus:
  enabled: true
  commands:
    - "show interface {interface_each}"
    - "show interface {interface_each} status"
    - "show interface {interface_each} counters errors"
    - "show port-channel summary"
    - "show logging | include {interface_each}|LINK|UPDOWN|flap|rate|traffic"
# V7_12_PROMETHEUS_FIRST_TRAFFIC_ANOMALY END
