playbook_id: h3c_interface_duplex_mismatch
match:
  vendor: h3c
  alertname_regex: '^(双工模式)$'
execution:
  readonly_only: true
  auto_execute_allowed: true
  max_commands: 6
  commands:
    - "display interface {interface_each}"
    - "display interface brief"
    - "display logbuffer | include {interface_each}|duplex|Duplex|speed|Speed|DOWN|UPDOWN"
