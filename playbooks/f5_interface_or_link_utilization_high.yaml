playbook_id: f5_interface_or_link_utilization_high
match:
  vendor: f5
  alertname_regex: '^(利用率-入向|利用率-出向|接口利用率-入向|接口利用率-出向|线路利用率-入向|线路利用率-出向|.*利用率.*入向|.*利用率.*出向)$'
execution:
  readonly_only: true
  auto_execute_allowed: true
  max_commands: 6
  commands:
    - "tmsh show net interface"
    - "tmsh show net trunk"
    - "tmsh show sys performance throughput"
