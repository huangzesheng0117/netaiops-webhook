playbook_id: cisco_internet_line_latency_high
match:
  vendor: cisco
  alertname_regex: '^(互联网线路延迟|互联网线路时延|互联网链路延迟|互联网链路时延|.*互联网线路.*延迟.*|.*互联网链路.*延迟.*|DCI专线延迟|DCI专线时延|DCI线路延迟|DCI线路时延|DCI链路延迟|DCI链路时延|.*DCI.*延迟.*|.*DCI.*时延.*)$'
execution:
  readonly_only: true
  auto_execute_allowed: true
  max_commands: 6
  commands:
    - "show ip sla statistics"
    - "show ip sla configuration"
    - "show interface {interface_each}"
    - "show interface {interface_each} counters errors"
    - "show logging | include {interface_each}|IPSLAs|SLA|RTT|timeout|Timeout|LINK|UPDOWN|flap"
