defaults:
  lookback_minutes: 15
  compare_offset_minutes: 5
  step_seconds: 60
  timeout_seconds: 15
  max_candidates_per_query: 1
  sidecar_overall_timeout_seconds: 45
  sidecar_parallel_workers: 3
  rate_window: 1m
profiles:
  poc_count_up:
    description: POC：验证 Prometheus MCP query/query_range 与窗口统计
    queries:
      current:
        promql: count(up)
        unit: count
        direction: all
  device_up:
    description: 设备采集 up 状态
    labels:
      required_any:
      - ip
      - instance
    queries:
      current:
        promql_candidates:
        - up{ip="{{ device_ip }}"}
        - up{instance="{{ device_ip }}"}
        unit: state
        direction: all
  interface_traffic:
    description: 接口入/出方向流量 bps
    labels:
      required:
      - device_ip
      - if_name
    queries:
      in_bps:
        promql_candidates:
        - rate(ifHCInOctets{ip="{{ device_ip }}", ifName="{{ if_name }}"}[1m]) * 8
        - rate(ifInOctets{ip="{{ device_ip }}", ifName="{{ if_name }}"}[1m]) * 8
        - rate(ifHCInOctets{instance="{{ device_ip }}", ifName="{{ if_name }}"}[1m]) * 8
        - rate(ifInOctets{instance="{{ device_ip }}", ifName="{{ if_name }}"}[1m]) * 8
        unit: bps
        direction: in
      out_bps:
        promql_candidates:
        - rate(ifHCOutOctets{ip="{{ device_ip }}", ifName="{{ if_name }}"}[1m]) * 8
        - rate(ifOutOctets{ip="{{ device_ip }}", ifName="{{ if_name }}"}[1m]) * 8
        - rate(ifHCOutOctets{instance="{{ device_ip }}", ifName="{{ if_name }}"}[1m]) * 8
        - rate(ifOutOctets{instance="{{ device_ip }}", ifName="{{ if_name }}"}[1m]) * 8
        unit: bps
        direction: out
      oper_status:
        promql_candidates:
        - ifOperStatus{ip="{{ device_ip }}", ifName="{{ if_name }}"}
        - ifOperStatus{instance="{{ device_ip }}", ifName="{{ if_name }}"}
        unit: status
        direction: all
  interface_errors:
    description: 接口错误/丢弃计数 5 分钟增量
    labels:
      required:
      - device_ip
      - if_name
    queries:
      in_errors_delta:
        promql_candidates:
        - increase(ifInErrors{ip="{{ device_ip }}", ifName="{{ if_name }}"}[1m])
        - increase(ifInErrors{instance="{{ device_ip }}", ifName="{{ if_name }}"}[1m])
        unit: count
        direction: in
      out_errors_delta:
        promql_candidates:
        - increase(ifOutErrors{ip="{{ device_ip }}", ifName="{{ if_name }}"}[1m])
        - increase(ifOutErrors{instance="{{ device_ip }}", ifName="{{ if_name }}"}[1m])
        unit: count
        direction: out
      in_discards_delta:
        promql_candidates:
        - increase(ifInDiscards{ip="{{ device_ip }}", ifName="{{ if_name }}"}[1m])
        - increase(ifInDiscards{instance="{{ device_ip }}", ifName="{{ if_name }}"}[1m])
        unit: count
        direction: in
      out_discards_delta:
        promql_candidates:
        - increase(ifOutDiscards{ip="{{ device_ip }}", ifName="{{ if_name }}"}[1m])
        - increase(ifOutDiscards{instance="{{ device_ip }}", ifName="{{ if_name }}"}[1m])
        unit: count
        direction: out
  f5_connections:
    description: F5 活跃连接数
    queries:
      current_connections:
        promql_candidates:
        - sysStatClientCurConns1m{ip="{{ device_ip }}"}
        - sysStatClientCurConns1m{instance="{{ device_ip }}"}
        - sysStatClientCurConns1m{job=~".*F5.*", ip="{{ device_ip }}"}
        - sysStatClientCurConns1m{job=~".*F5.*", instance="{{ device_ip }}"}
        unit: connections
        direction: all
  device_cpu_utilization:
    description: Cisco device CPU utilization historical evidence. Current VictoriaMetrics only has cpmCPUTotal1minRev for device CPU utilization.
    queries:
      cpu_1min:
        description: Cisco CPU 1 minute utilization from CISCO-PROCESS-MIB cpmCPUTotal1minRev.
        unit: percent
        promql_candidates:
        - avg(cpmCPUTotal1minRev{ip="{{device_ip}}"})
        - avg(cpmCPUTotal1minRev{instance="{{device_ip}}"})
        - avg(cpmCPUTotal1minRev{instance=~"{{device_ip}}(:[0-9]+)?"})
  device_filesystem_usage:
    description: Cisco device filesystem / Flash / bootflash historical usage evidence.
    queries:
      filesystem_usage_percent:
        description: Filesystem usage percent from HOST-RESOURCES-MIB hrStorage or CISCO-FLASH-MIB partition metrics.
        unit: percent
        promql_candidates:
        - 100 * avg by (ip, hrStorageDescr) (hrStorageUsed{ip="{{device_ip}}",hrStorageDescr=~".*(flash|bootflash|crashinfo|log|volatile).*"}) / avg by (ip, hrStorageDescr) (hrStorageSize{ip="{{device_ip}}",hrStorageDescr=~".*(flash|bootflash|crashinfo|log|volatile).*"})
        - 100 * avg by (instance, hrStorageDescr) (hrStorageUsed{instance="{{device_ip}}",hrStorageDescr=~".*(flash|bootflash|crashinfo|log|volatile).*"}) / avg by (instance, hrStorageDescr) (hrStorageSize{instance="{{device_ip}}",hrStorageDescr=~".*(flash|bootflash|crashinfo|log|volatile).*"})
        - 100 * (1 - (ciscoFlashPartitionFreeSpace{ip="{{device_ip}}"} / ciscoFlashPartitionSize{ip="{{device_ip}}"}))
        - 100 * (1 - (ciscoFlashPartitionFreeSpace{instance="{{device_ip}}"} / ciscoFlashPartitionSize{instance="{{device_ip}}"}))
  device_memory_usage:
    description: Cisco device memory historical usage evidence.
    queries:
      memory_usage_percent:
        description: Device memory usage percent from Cisco cseSysMemoryUtilization, cpmCPUMemoryUsed/Free, Cisco memory pool, HOST-RESOURCES-MIB, or generic memory metrics.
        unit: percent
        promql_candidates:
        - avg by (ip) (cseSysMemoryUtilization{ip="{{device_ip}}"})
        - avg by (instance) (cseSysMemoryUtilization{instance="{{device_ip}}"})
        - avg by (instance) (cseSysMemoryUtilization{instance=~"{{device_ip}}(:.*)?"})
        - 100 * avg by (ip) (cpmCPUMemoryUsed{ip="{{device_ip}}"}) / (avg by (ip) (cpmCPUMemoryUsed{ip="{{device_ip}}"}) + avg by (ip) (cpmCPUMemoryFree{ip="{{device_ip}}"}) )
        - 100 * avg by (instance) (cpmCPUMemoryUsed{instance="{{device_ip}}"}) / (avg by (instance) (cpmCPUMemoryUsed{instance="{{device_ip}}"}) + avg by (instance) (cpmCPUMemoryFree{instance="{{device_ip}}"}) )
        - 100 * avg by (instance) (cpmCPUMemoryUsed{instance=~"{{device_ip}}(:.*)?"}) / (avg by (instance) (cpmCPUMemoryUsed{instance=~"{{device_ip}}(:.*)?"}) + avg by (instance) (cpmCPUMemoryFree{instance=~"{{device_ip}}(:.*)?"})
          )
        - 100 * avg by (ip, ciscoMemoryPoolName) (ciscoMemoryPoolUsed{ip="{{device_ip}}"}) / (avg by (ip, ciscoMemoryPoolName) (ciscoMemoryPoolUsed{ip="{{device_ip}}"}) + avg by (ip, ciscoMemoryPoolName) (ciscoMemoryPoolFree{ip="{{device_ip}}"})
          )
        - 100 * avg by (instance, ciscoMemoryPoolName) (ciscoMemoryPoolUsed{instance="{{device_ip}}"}) / (avg by (instance, ciscoMemoryPoolName) (ciscoMemoryPoolUsed{instance="{{device_ip}}"}) + avg by (instance, ciscoMemoryPoolName)
          (ciscoMemoryPoolFree{instance="{{device_ip}}"}) )
        - 100 * avg by (ip, hrStorageDescr) (hrStorageUsed{ip="{{device_ip}}",hrStorageDescr=~".*(Memory|memory|RAM|Processor|DRAM).*"}) / avg by (ip, hrStorageDescr) (hrStorageSize{ip="{{device_ip}}",hrStorageDescr=~".*(Memory|memory|RAM|Processor|DRAM).*"})
        - 100 * avg by (instance, hrStorageDescr) (hrStorageUsed{instance="{{device_ip}}",hrStorageDescr=~".*(Memory|memory|RAM|Processor|DRAM).*"}) / avg by (instance, hrStorageDescr) (hrStorageSize{instance="{{device_ip}}",hrStorageDescr=~".*(Memory|memory|RAM|Processor|DRAM).*"})
        - avg by (ip) (memory_usage_percent{ip="{{device_ip}}"})
        - avg by (instance) (memory_usage_percent{instance="{{device_ip}}"})
        - avg by (ip) (device_memory_usage_percent{ip="{{device_ip}}"})
        - avg by (instance) (device_memory_usage_percent{instance="{{device_ip}}"})
